<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kategori | IZA Makina</title>

  <meta
    name="description"
    content="IZA Makina ürün kategorileri ve makine listesi."
  />

  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

<div id="site-header"></div>

<main>

  <section class="page-hero">
    <div class="container">

      <h1 id="category-title">
        Kategori
      </h1>

      <p id="category-description">
        Bu kategoriye ait makineleri inceleyin.
      </p>

    </div>
  </section>

  <section class="products">

    <div class="container">

      <div class="section-heading">

        <span class="section-label">
          Makine Listesi
        </span>

        <h2 id="category-heading">
          Kategori Ürünleri
        </h2>

        <p id="category-count">
          Bu kategoriye ait ürünler aşağıda listelenmiştir.
        </p>

      </div>

      <div
        id="category-product-list"
        class="product-grid"
      ></div>

    </div>

  </section>

</main>

<div id="site-footer"></div>

<script src="../data/products.js"></script>
<script src="../assets/js/category.js"></script>
<script src="../assets/js/layout.js"></script>

</body>
</html>
